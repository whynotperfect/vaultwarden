name: Build Vaultwarden for Termux

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d

      - name: Setup Rust
        run: rustup target add aarch64-linux-android

      - name: Configure NDK linker
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << 'EOF'
          [target.aarch64-linux-android]
          linker = "${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android33-clang"
          EOF

      - name: Build
        run: |
          cargo build --release \
            --target aarch64-linux-android \
            --features sqlite

      - uses: actions/upload-artifact@v4
        with:
          name: vaultwarden-termux
          path: target/aarch64-linux-android/release/vaultwarden
